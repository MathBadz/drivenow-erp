  # ─── maintenance-service (:8006) ──────────────────────────────────────────
  /api/v1/maintenance:
    get:
      operationId: listMaintenance
      summary: List maintenance records
      description: >
        Returns all maintenance records ordered by ID descending. Supports optional
        filtering by `status` and/or `vehicle_id`. Consumed by analytics-service.
      tags:
        - Maintenance
      servers:
        - url: http://localhost:8006
          description: maintenance-service (direct)
      parameters:
        - name: status
          in: query
          description: Filter by maintenance status
          required: false
          schema:
            type: string
            enum: [scheduled, in_progress, completed, cancelled]
          example: scheduled
        - name: vehicle_id
          in: query
          description: Filter records for a specific vehicle
          required: false
          schema:
            type: integer
          example: 3
      responses:
        '200':
          description: Collection of maintenance records
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/MaintenanceRecord'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/v1/maintenance/{record}:
    get:
      operationId: getMaintenanceRecord
      summary: Get a single maintenance record
      description: Returns a single maintenance record by its ID.
      tags:
        - Maintenance
      servers:
        - url: http://localhost:8006
          description: maintenance-service (direct)
      parameters:
        - name: record
          in: path
          required: true
          description: Maintenance record ID (integer primary key)
          schema:
            type: integer
          example: 1
      responses:
        '200':
          description: Single maintenance record
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/MaintenanceRecord'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  # ─── analytics-service (:8007) ────────────────────────────────────────────
  /api/v1/summary:
    get:
      operationId: getAnalyticsSummary
      summary: Get headline KPIs
      description: >
        Returns aggregated KPIs derived by concurrently querying fleet, rental,
        CRM and maintenance services via their `/api/v1/` endpoints. Results are
        cached for ~2 minutes. When a source service is unreachable, representative
        fallback values are used so the dashboard never goes blank — the full
        dashboard payload (not returned here) additionally exposes a
        `meta.degraded` array naming which services were offline.
      tags:
        - Analytics
      servers:
        - url: http://localhost:8007
          description: analytics-service (direct)
      responses:
        '200':
          description: Headline KPI summary
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/AnalyticsKpis'
              example:
                data:
                  revenue: 42500.0
                  rentals: 350
                  utilization: 68
                  active_customers: 215
                  avg_rental_value: 121
                  maintenance_cost: 18400.0
        '401':
          $ref: '#/components/responses/Unauthorized'
