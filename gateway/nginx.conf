# =============================================================================
# DriveNow ERP — API Gateway (single public entry point)
# =============================================================================
# One public origin (http://localhost:8080) fronts all 8 microservices. The
# browser and every external API client talk ONLY to the gateway; the gateway
# routes by path prefix to the service that owns each domain. This is the
# "single entry point" the brief requires (audit finding C2).
#
# Run (Windows, nginx installed):
#   nginx -p . -c nginx.conf
# Or drop this server{} block into your existing nginx http{} context.
#
# When deployed behind this gateway, set each service's APP_URL to the gateway
# origin + its prefix (e.g. auth-service APP_URL=http://localhost:8080/auth) so
# generated links and the logo URL (audit R7) resolve through the gateway.
# =============================================================================

worker_processes 1;

events { worker_connections 1024; }

http {
    # --- Upstreams: the 8 services (php artisan serve / php-fpm) ----------
    upstream auth_service        { server 127.0.0.1:8001; }
    upstream fleet_service       { server 127.0.0.1:8002; }
    upstream rental_service      { server 127.0.0.1:8003; }
    upstream crm_service         { server 127.0.0.1:8004; }
    upstream billing_service     { server 127.0.0.1:8005; }
    upstream maintenance_service { server 127.0.0.1:8006; }
    upstream analytics_service   { server 127.0.0.1:8007; }
    upstream client_service      { server 127.0.0.1:8008; }

    # Forward the real host/scheme/IP so services build correct absolute URLs
    # and see the true client address in the uniform activity log (C9).
    proxy_http_version 1.1;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host  $host;
    # Preserve the cross-service SSO cookie (drivenow_token) on every hop.
    proxy_pass_request_headers on;

    server {
        listen 8080;
        server_name localhost drivenow.local;

        # --- Operations Hub / identity provider --------------------------
        location /auth/        { proxy_pass http://auth_service/; }

        # --- ERP back-office services ------------------------------------
        location /fleet/       { proxy_pass http://fleet_service/; }
        location /rental/      { proxy_pass http://rental_service/; }
        location /crm/         { proxy_pass http://crm_service/; }
        location /billing/     { proxy_pass http://billing_service/; }
        location /maintenance/ { proxy_pass http://maintenance_service/; }
        location /analytics/   { proxy_pass http://analytics_service/; }

        # --- Public customer portal (default origin) ---------------------
        location / { proxy_pass http://client_service; }
    }
}
