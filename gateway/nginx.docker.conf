# =============================================================================
# DriveNow ERP — API Gateway (containerized, host-based routing)
# =============================================================================
# Single public origin. Routes by Host (subdomain) to the owning service so
# each full Inertia app runs at its OWN root — no URL-prefix rewriting, which
# keeps every server-generated link correct. The `<svc>.*` patterns match both
# local (`auth.localhost`) and production (`auth.yourdomain.com`).
#
#   auth.<host>        -> auth-service        (Operations Hub / identity)
#   fleet.<host>       -> fleet-service
#   rental.<host>      -> rental-service
#   crm.<host>         -> crm-service
#   billing.<host>     -> billing-service
#   maintenance.<host> -> maintenance-service
#   analytics.<host>   -> analytics-service
#   <host> (default)   -> client-service      (public customer portal)
#
# SSO note: for cross-subdomain login set each service's SESSION_DOMAIN to the
# shared parent (e.g. `.yourdomain.com`) so the drivenow_token cookie is sent
# to every subdomain.
# =============================================================================

upstream auth_service        { server auth-service:80; }
upstream fleet_service       { server fleet-service:80; }
upstream rental_service      { server rental-service:80; }
upstream crm_service         { server crm-service:80; }
upstream billing_service     { server billing-service:80; }
upstream maintenance_service { server maintenance-service:80; }
upstream analytics_service   { server analytics-service:80; }
upstream client_service      { server client-service:80; }

# Shared proxy behaviour for every virtual host.
map $http_upgrade $connection_upgrade { default upgrade; '' close; }

server {
    listen 80;
    server_name auth.*;
    location = /healthz { return 200 "ok\n"; add_header Content-Type text/plain; }
    location / { proxy_pass http://auth_service; include /etc/nginx/conf.d/_proxy.inc; }
}
server {
    listen 80;
    server_name fleet.*;
    location / { proxy_pass http://fleet_service; include /etc/nginx/conf.d/_proxy.inc; }
}
server {
    listen 80;
    server_name rental.*;
    location / { proxy_pass http://rental_service; include /etc/nginx/conf.d/_proxy.inc; }
}
server {
    listen 80;
    server_name crm.*;
    location / { proxy_pass http://crm_service; include /etc/nginx/conf.d/_proxy.inc; }
}
server {
    listen 80;
    server_name billing.*;
    location / { proxy_pass http://billing_service; include /etc/nginx/conf.d/_proxy.inc; }
}
server {
    listen 80;
    server_name maintenance.*;
    location / { proxy_pass http://maintenance_service; include /etc/nginx/conf.d/_proxy.inc; }
}
server {
    listen 80;
    server_name analytics.*;
    location / { proxy_pass http://analytics_service; include /etc/nginx/conf.d/_proxy.inc; }
}

# Default origin: the public customer portal.
server {
    listen 80 default_server;
    server_name _;
    location = /healthz { return 200 "ok\n"; add_header Content-Type text/plain; }
    location / { proxy_pass http://client_service; include /etc/nginx/conf.d/_proxy.inc; }
}
