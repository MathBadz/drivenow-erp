# DriveNow ERP — nginx site (serves Laravel public/ and proxies PHP to php-fpm)
server {
    listen 80 default_server;
    server_name _;
    root /var/www/html/public;
    index index.php;

    charset utf-8;
    client_max_body_size 20M;

    # Long-cache the fingerprinted Vite build assets.
    # CORS wildcard lets the gateway (different port) load JS/CSS/fonts
    # without a browser block — safe because these are public static files.
    location /build/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header Access-Control-Allow-Origin "*";
        add_header Access-Control-Allow-Methods "GET, OPTIONS";
        try_files $uri =404;
    }

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # Laravel health endpoint shortcut (also handled by the rewrite above).
    location = /up {
        try_files $uri /index.php?$query_string;
    }

    location ~ \.php$ {
        fastcgi_pass 127.0.0.1:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;
        fastcgi_read_timeout 60;
    }

    # Deny dotfiles (except ACME well-known).
    location ~ /\.(?!well-known).* {
        deny all;
    }

    error_log /dev/stderr warn;
    access_log /dev/stdout;
}
